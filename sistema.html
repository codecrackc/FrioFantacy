<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>FrioFantasy | Sistema de Facturación Enterprise</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <style>
    :root {
      --primary: #667eea;
      --primary-dark: #5a67d8;
      --primary-light: #7f9cf5;
      --secondary: #764ba2;
      --secondary-dark: #6b46c0;
      --accent: #f687b3;
      --success: #48bb78;
      --success-dark: #38a169;
      --danger: #f56565;
      --warning: #ed8936;
      --dark: #2d3748;
      --dark-800: #1a202c;
      --dark-700: #4a5568;
      --gray-600: #718096;
      --gray-400: #a0aec0;
      --gray-200: #e2e8f0;
      --gray-100: #edf2f7;
      --glass-bg: rgba(255, 255, 255, 0.98);
      --glass-border: rgba(255, 255, 255, 0.2);
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
      --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
      --shadow-2xl: 0 25px 50px -12px rgb(0 0 0 / 0.25);
      --shadow-glow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }

    * { 
      font-family: 'Poppins', 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Gradientes principales */
    .gradient-bg {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    .gradient-text {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes pulse {
      0% { transform: scale(0.95); opacity: 0.7; }
      70% { transform: scale(1.1); opacity: 0.4; }
      100% { transform: scale(0.95); opacity: 0.7; }
    }

    .animate-fade-up { animation: fadeInUp 0.4s ease-out; }
    .animate-slide-in { animation: slideIn 0.3s ease-out; }
    .animate-scale-in { animation: scaleIn 0.2s ease-out; }

    /* Sidebar mejorado */
    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      height: 100vh;
      width: 280px;
      background: linear-gradient(180deg, #1a1c2e 0%, #2d1b4e 100%);
      backdrop-filter: blur(10px);
      z-index: 100;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 10px 0 40px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
    }

    .sidebar.collapsed { width: 88px; }
    .sidebar.collapsed .sidebar-text, .sidebar.collapsed .menu-label, .sidebar.collapsed .user-info { display: none; }
    .sidebar.collapsed .logo-text { display: none; }
    .sidebar.collapsed .logo-icon { margin: 0 auto; }
    .sidebar.collapsed .menu-item { justify-content: center; padding: 12px; }
    .sidebar.collapsed .menu-item i { margin: 0; }

    .main-content { margin-left: 280px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); min-height: 100vh; }
    .main-content.expanded { margin-left: 88px; }

    .sidebar-nav { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 0 1rem; }
    .sidebar-nav::-webkit-scrollbar { width: 4px; }
    .sidebar-nav::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); border-radius: 4px; }
    .sidebar-nav::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }

    .menu-item {
      position: relative;
      overflow: hidden;
      transition: all 0.2s ease;
      border-radius: 12px;
      margin-bottom: 4px;
      width: 100%;
      text-align: left;
      background: transparent;
      border: none;
      cursor: pointer;
    }

    .menu-item::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: -1;
    }

    .menu-item:hover::before { opacity: 0.15; }
    .menu-item.active { background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(118, 75, 162, 0.2)); border-left: 3px solid var(--primary); }
    .menu-item.active i { color: var(--primary); }
    .menu-item.active span { color: white; font-weight: 500; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--gray-100); border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 10px; }

    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      transition: all 0.3s ease;
      box-shadow: var(--shadow-lg);
      border-radius: 20px;
    }
    .glass-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-xl); }

    .input-premium {
      background: white;
      border: 1.5px solid var(--gray-200);
      transition: all 0.2s ease;
      border-radius: 12px;
      padding: 0.75rem 1rem;
      width: 100%;
    }
    .input-premium:focus { border-color: var(--primary); box-shadow: var(--shadow-glow); outline: none; }

    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      transition: all 0.2s ease;
      border: none;
      cursor: pointer;
      padding: 0.75rem 1.5rem;
      border-radius: 12px;
      font-weight: 600;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 10px 25px -5px rgba(102, 126, 234, 0.4); }

    .btn-secondary {
      background: linear-gradient(135deg, var(--success), #68d391);
      color: white;
      transition: all 0.2s ease;
      cursor: pointer;
      padding: 0.75rem 1.5rem;
      border-radius: 12px;
      font-weight: 600;
      border: none;
    }
    .btn-secondary:hover { transform: translateY(-1px); box-shadow: 0 10px 25px -5px rgba(72, 187, 120, 0.3); }

    .stat-card {
      background: linear-gradient(135deg, white, var(--gray-100));
      border-radius: 20px;
      padding: 1.5rem;
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.5);
    }
    .stat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-xl); }

    .badge-stock-high { background: linear-gradient(135deg, var(--success), #68d391); color: white; padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .badge-stock-low { background: linear-gradient(135deg, var(--warning), #f6ad55); color: white; padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .badge-stock-out { background: linear-gradient(135deg, var(--danger), #fc8181); color: white; padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .web-data-badge { background: linear-gradient(135deg, #48bb78, #68d391); color: white; font-size: 0.7rem; padding: 2px 8px; border-radius: 20px; margin-left: 8px; display: inline-block; }

    .data-table { width: 100%; border-collapse: separate; border-spacing: 0; }
    .data-table th { background: var(--gray-100); padding: 1rem; font-weight: 600; color: var(--dark-700); font-size: 0.875rem; border-bottom: 2px solid var(--gray-200); text-align: left; }
    .data-table td { padding: 1rem; border-bottom: 1px solid var(--gray-200); font-size: 0.875rem; }
    .data-table tr:hover { background: var(--gray-100); transition: all 0.2s ease; }

    .float-btn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: var(--shadow-xl);
      transition: all 0.3s ease;
      z-index: 99;
    }
    .float-btn:hover { transform: scale(1.1); }

    .mobile-menu-btn {
      display: none;
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 101;
      background: linear-gradient(135deg, #667eea, #764ba2);
      width: 48px;
      height: 48px;
      border-radius: 14px;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: var(--shadow-lg);
    }

    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.mobile-open { transform: translateX(0); }
      .main-content { margin-left: 0; }
      .main-content.expanded { margin-left: 0; }
      .mobile-menu-btn { display: flex; }
    }

    .cart-item-premium {
      background: white;
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 0.5rem;
      transition: all 0.2s ease;
      border: 1px solid var(--gray-200);
    }
    .cart-item-premium:hover { border-color: var(--primary); box-shadow: var(--shadow-md); }

    /* Modal de notificaciones mejorado */
    .notification-modal {
      position: fixed;
      top: 70px;
      right: 20px;
      width: 380px;
      background: white;
      border-radius: 20px;
      box-shadow: var(--shadow-2xl);
      z-index: 200;
      display: none;
      animation: scaleIn 0.2s ease-out;
    }
    .notification-modal.show { display: block; }

    .notification-badge { position: relative; }
    .notification-badge .new-indicator {
      position: absolute;
      top: -5px;
      right: -5px;
      width: 12px;
      height: 12px;
      background: #f56565;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    .notification-badge .new-indicator.hidden { display: none; }

    .form-group { margin-bottom: 1.25rem; }
    .form-label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.5rem; color: var(--dark-700); }
    .permission-group { border: 1px solid var(--gray-200); border-radius: 12px; padding: 1rem; margin-bottom: 1rem; }
    .permission-group-title { font-weight: 600; margin-bottom: 0.75rem; color: var(--dark); }
    .permission-item { display: inline-flex; align-items: center; margin-right: 1rem; margin-bottom: 0.5rem; }
    .permission-item input { margin-right: 0.5rem; }
    
    .notification-item {
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .notification-item:hover {
      background: #f7fafc;
    }
  </style>
</head>
<body>

<!-- Pantalla de Login -->
<div id="loginScreen" class="fixed inset-0 z-50 flex items-center justify-center gradient-bg">
  <div class="bg-white rounded-3xl p-8 w-full max-w-md mx-4 shadow-2xl animate-scale-in">
    <div class="text-center mb-8">
      <div class="w-20 h-20 rounded-2xl flex items-center justify-center mx-auto shadow-lg mb-4 gradient-bg">
        <i class="fas fa-ice-cream text-white text-4xl"></i>
      </div>
      <h2 class="text-3xl font-bold gradient-text">FrioFantasy</h2>
      <p class="text-gray-500 mt-2">Sistema de Facturación Enterprise</p>
    </div>
    <div class="space-y-5">
      <div><label class="form-label">Usuario</label><div class="relative"><i class="fas fa-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i><input type="text" id="loginUsername" class="input-premium pl-10" placeholder="Ingrese su usuario"></div></div>

</div>

<!-- Mobile Menu Button -->
<div class="mobile-menu-btn" id="mobileMenuBtn" onclick="toggleMobileSidebar()" style="display: none;"><i class="fas fa-bars text-white text-xl"></i></div>

<!-- Modal de Notificaciones Mejorado -->
<div class="notification-modal" id="notificationModal">
  <div class="p-4 border-b gradient-bg rounded-t-2xl" style="border-color: rgba(255,255,255,0.2);">
    <div class="flex justify-between items-center">

        <i class="fas fa-bell text-white"></i>
        <h3 class="font-bold text-lg text-white">Notificaciones</h3>

  </div>
</div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar" style="display: none;">
  <div class="p-6">
    <div class="flex items-center justify-between mb-8">
      <div class="flex items-center gap-3 logo-icon">
        <div class="w-11 h-11 rounded-xl flex items-center justify-center shadow-lg gradient-bg">
          <i class="fas fa-ice-cream text-white text-xl"></i>

<!-- Main Content -->

  <i class="fas fa-question text-white text-2xl"></i>
</div>

<script>
// ======================== DATOS WEB Y NOTIFICACIONES MEJORADAS ========================
let webData = { pedidos: [], clientes: [], suscriptores: [], ultimaActualizacion: null };
let notificacionesWeb = [];

function cargarDatosWeb() {
  const stored = localStorage.getItem('friofantasy_webhook_data');
  if (stored) {
    try {
      const parsed = JSON.parse(stored);
      webData.pedidos = parsed.pedidos || [];
      webData.clientes = parsed.clientes || [];
      webData.suscriptores = parsed.suscriptores || [];
      webData.ultimaActualizacion = parsed.ultimaActualizacion || new Date().toISOString();
      console.log('✅ Datos web cargados:', webData.pedidos.length, 'pedidos,', webData.clientes.length, 'clientes');
    } catch(e) { console.log('Error cargando datos web:', e); }
  }
  if (webData.pedidos.length === 0 && webData.clientes.length === 0) {
    webData = { pedidos: [], clientes: [], suscriptores: [], ultimaActualizacion: new Date().toISOString() };
    localStorage.setItem('friofantasy_webhook_data', JSON.stringify(webData));
  }
  
  // Simular recepción de datos web periódicamente para pruebas
  window.addEventListener('datosWebActualizados', function(event) {
    console.log('📡 Evento recibido de la tienda:', event.detail);
    cargarDatosWeb();
    agregarNotificacionWeb(event.detail);
    if (currentUser && document.getElementById('moduleContent').innerHTML.includes('Datos de la Web')) renderWebData();
    if (currentUser && document.getElementById('moduleContent').innerHTML.includes('Pedidos')) loadModule('orders');
  });
}

function agregarNotificacionWeb(datos) {
  const nuevaNotificacion = { 
    id: Date.now(), 
    tipo: datos.tipo, 
    datos: datos.datos, 
    fecha: new Date().toLocaleString(), 
    leida: false,
    timestamp: new Date().getTime()
  };
  notificacionesWeb.unshift(nuevaNotificacion);
  while (notificacionesWeb.length > 50) notificacionesWeb.pop();
  localStorage.setItem('friofantasy_notificaciones', JSON.stringify(notificacionesWeb));
  actualizarIndicadorNotificaciones();
  
  // Mostrar toast de notificación
  let mensaje = '';
  let icono = 'info';
  let titulo = '¡Nuevos Datos de la Web!';
  
  if (datos.tipo === 'pedido') {
    mensaje = `📦 Nuevo pedido de ${datos.datos.cliente_nombre || 'cliente'} por ${formatCurrency(datos.datos.total || 0)}`;
    icono = 'success';
  } else if (datos.tipo === 'cliente') {
    mensaje = `👤 Nuevo cliente registrado: ${datos.datos.nombre || datos.datos.email}`;
    icono = 'info';
  } else if (datos.tipo === 'suscripcion') {
    mensaje = `📧 Nueva suscripción: ${datos.datos.email}`;
    icono = 'success';
  }
  
  if (mensaje && typeof Swal !== 'undefined') {
    Swal.fire({
      title: titulo,
      text: mensaje,
      icon: icono,
      timer: 4000,
      showConfirmButton: false,
      position: 'top-end',
      toast: true,
      background: 'white',
      timerProgressBar: true
    });
  }
}

function cargarNotificaciones() {
  const stored = localStorage.getItem('friofantasy_notificaciones');
  if (stored) { 
    try { 
      notificacionesWeb = JSON.parse(stored); 
    } catch(e) { 
      notificacionesWeb = []; 
    } 
  }
  actualizarIndicadorNotificaciones();
}

function actualizarIndicadorNotificaciones() {

function safeParseInt(val, defaultValue = 0) { const parsed = parseInt(val); return isNaN(parsed) ? defaultValue : parsed; }
function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m) { if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; return m; }); }
function formatDateForCompare(dateStr) { if(!dateStr) return ''; var parts = dateStr.split(',')[0].split('/'); if(parts.length === 3) return parts[2] + '-' + parts[1].padStart(2,'0') + '-' + parts[0].padStart(2,'0'); return dateStr; }
function getCurrentISODate() { var now = new Date(); return now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0'); }
function formatCurrency(amount) { if(amount === undefined || amount === null) return 'RD$ 0.00'; return new Intl.NumberFormat('es-DO', { style: 'currency', currency: 'DOP' }).format(amount); }
function getCurrentDateTime() { return new Date().toLocaleString('es-ES', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' }); }

function loadData() {

  if (saved) {
    try {
      const p = JSON.parse(saved);
      appData.products         = p.products         || [];
      appData.customers        = p.customers        || [];
      appData.users            = p.users            || [];
      appData.invoices         = p.invoices         || [];
      appData.salesWithoutInvoice = p.salesWithoutInvoice || [];
      appData.orders           = p.orders           || [];
      appData.cashSessions     = p.cashSessions     || { open: true, currentCash: 0, lastClose: null };

function saveData() {
  const data = { products: appData.products, customers: appData.customers, invoices: appData.invoices, salesWithoutInvoice: appData.salesWithoutInvoice, orders: appData.orders, users: appData.users, cashSessions: appData.cashSessions, nextInvoiceId: appData.nextInvoiceId, nextTicketId: appData.nextTicketId, nextOrderId: appData.nextOrderId, systemConfig: systemConfig };
  localStorage.setItem('friofantasy_data_v10', JSON.stringify(data));
  if (typeof firebaseDB !== 'undefined' && firebaseDB && navigator.onLine) {
    firebaseSyncTodas(data);
  } else if (!navigator.onLine) {
    const cola = JSON.parse(localStorage.getItem('ff_cola_offline') || '[]');
    cola.push({ ts: Date.now() });
    localStorage.setItem('ff_cola_offline', JSON.stringify(cola));
    actualizarIndicadorRed();
    console.log('📵 Guardado offline – se sincronizará al reconectar');
  }
}

function firebaseSyncTodas(data) {
  if (!firebaseDB) return;
  try {
    const fb = firebaseDB.ref('sistema');
    const products = {}; (data.products||[]).forEach(p => { products['p'+p.id] = p; });
    fb.child('productos').set(products).catch(()=>{});
    const customers = {}; (data.customers||[]).forEach(c => { customers['c'+c.id] = c; });
    fb.child('clientes').set(customers).catch(()=>{});
    const users = {}; (data.users||[]).forEach(u => { users['u'+u.id] = u; });
    fb.child('usuarios').set(users).catch(()=>{});
    const invoices = {}; (data.invoices||[]).forEach(f => { invoices['f'+f.id] = f; });
    fb.child('facturas').set(invoices).catch(()=>{});
    const orders = {}; (data.orders||[]).forEach(o => { orders['o'+o.id] = o; });
    fb.child('ordenes').set(orders).catch(()=>{});
    fb.child('caja').set(data.cashSessions).catch(()=>{});
    fb.child('config').set(data.systemConfig).catch(()=>{});
    fb.child('contadores').set({ nextInvoiceId: data.nextInvoiceId, nextTicketId: data.nextTicketId, nextOrderId: data.nextOrderId }).catch(()=>{});
  } catch(e) { console.warn('Firebase sync error:', e); }
}
function getNextId(items) { if(items.length === 0) return 1; return Math.max(...items.map(i => i.id)) + 1; }

ce mr-1"></i>Facturar</button><button onclick="processSaleWithoutInvoice()" class="btn-secondary"><i class="fas fa-receipt mr-1"></i>Ticket</button><button onclick="createOrderFromCart()" class="py-3 rounded-xl font-semibold" style="background:#ed8936;color:white;border:none;cursor:pointer;"><i class="fas fa-truck mr-1"></i>Pedido</button></div></div></div></div><div class="space-y-6"><div class="rounded-2xl p-6 text-white shadow-xl gradient-bg"><i class="fas fa-chart-line text-4xl mb-3"></i><p class="text-white/80 text-sm">Efectivo en Caja</p><p class="text-4xl font-bold">${formatCurrency(appData.cashSessions.currentCash)}</p><p class="text-white/60 text-xs mt-2">ITBIS: ${systemConfig.itbisRate}%</p></div><div class="glass-card rounded-2xl p-6 shadow-xl"><h3 class="font-bold text-lg mb-4"><i class="fas fa-history" style="color:var(--primary);"></i> Últimas Ventas</h3><div id="lastSales" class="space-y-2 max-h-96 overflow-y-auto"></div></div></div></div></div>`;

function createOrderFromCart() {
  if(currentCart.length === 0) { Swal.fire('Error', 'Carrito vacío', 'warning'); return false; }
  const subt = currentCart.reduce((s,i) => s + i.price * i.qty, 0), tax = subt * (systemConfig.itbisRate / 100), total = subt + tax;
  const customerSelect = document.getElementById('customerSelect'), client = (customerSelect && customerSelect.value) ? appData.customers.find(c => c.id === parseInt(customerSelect.value)) : null;
  appData.orders.unshift({ id: Date.now(), orderNumber: appData.nextOrderId++, date: getCurrentDateTime(), clientName: client ? client.name : 'Consumidor Final', rnc: client ? client.rnc : '', subtotal: subt, tax: tax, total: total, status: 'Pendiente', items: currentCart.map(i => ({ name: i.name, qty: i.qty, price: i.price })), createdBy: currentUser.name });
  saveData();
  Swal.fire({ title: 'Pedido Creado', html: `<p class="text-2xl font-bold text-amber-500">#${appData.nextOrderId-1}</p><p>Total: ${formatCurrency(total)}</p>`, icon: 'success', confirmButtonColor: '#ed8936' });
  currentCart = []; updateCartUI(); loadModule('orders'); return true;
}

function addToCart() {
  const sel = document.getElementById('productSelect'); if(!sel || !sel.value) { Swal.fire('Error', 'Selecciona un producto', 'warning'); return; }
  const id = safeParseInt(sel.value), prod = appData.products.find(p => p.id === id);
  if(prod && prod.stock > 0) {
    const exist = currentCart.find(i => i.id === id);
    if(exist && exist.qty + 1 > prod.stock) { Swal.fire('Stock insuficiente', `Solo hay ${prod.stock} unidades`, 'warning'); return; }
    if(exist) exist.qty++; else { const newItem = JSON.parse(JSON.stringify(prod)); newItem.qty = 1; currentCart.push(newItem); }
    updateCartUI(); Swal.fire({ title: 'Agregado', text: `${prod.name} agregado al carrito`, icon: 'success', timer: 1000, showConfirmButton: false });
  } else Swal.fire('Sin stock', 'Producto no disponible', 'error');
  sel.value = '';
}

function updateCartUI() {
  let subt = 0; for(var item of currentCart) subt += item.price * item.qty;
  const tax = subt * (systemConfig.itbisRate / 100), total = subt + tax;
  const subtEl = document.getElementById('subtotal'), taxEl = document.getElementById('tax'), totalEl = document.getElementById('total');
  if(subtEl) subtEl.innerHTML = formatCurrency(subt); if(taxEl) taxEl.innerHTML = formatCurrency(tax); if(totalEl) totalEl.innerHTML = formatCurrency(total);
  const container = document.getElementById('cartItemsContainer');
  if(container) {
    if(currentCart.length === 0) container.innerHTML = '<div class="text-center text-gray-400 py-12"><i class="fas fa-shopping-cart text-5xl mb-3"></i><p>Carrito vacío</p></div>';
    else { let html = ''; for(var item of currentCart) { html += `<div class="cart-item-premium"><div class="flex justify-between items-center"><div class="flex-1"><p class="font-medium">${escapeHtml(item.name)}</p><p class="text-xs">${formatCurrency(item.price)} c/u</p></div><div class="flex items-center gap-2"><button onclick="changeQty(${item.id}, -1)" class="w-8 h-8 rounded-full flex items-center justify-center" style="background:var(--gray-100);color:var(--gray-600);border:none;cursor:pointer;">-</button><span class="w-8 text-center font-semibold">${item.qty}</span><button onclick="changeQty(${item.id}, 1)" class="w-8 h-8 rounded-full flex items-center justify-center" style="background:var(--gray-100);color:var(--gray-600);border:none;cursor:pointer;">+</button></div><div class="w-28 text-right font-semibold">${formatCurrency(item.price * item.qty)}</div><button onclick="removeItem(${item.id})" class="ml-2 text-red-400 hover:text-red-600" style="background:none;border:none;cursor:pointer;"><i class="fas fa-trash"></i></button></div></div>`; } container.innerHTML = html; }
  }
}

function changeQty(id, delta) { for(var i=0;i<currentCart.length;i++) { if(currentCart[i].id === id) { let newQty = currentCart[i].qty + delta; if(newQty <= 0) currentCart.splice(i,1); else { const prod = appData.products.find(p => p.id === id); if(delta > 0 && newQty > (prod ? prod.stock : 0)) { Swal.fire('Stock insuficiente', `Solo hay ${prod.stock} unidades`, 'warning'); return; } currentCart[i].qty = newQty; } updateCartUI(); return; } } }
function removeItem(id) { currentCart = currentCart.filter(i => i.id !== id); updateCartUI(); }
function processSale(isInvoice) {
  if(currentCart.length === 0) { Swal.fire('Error', 'Carrito vacío', 'warning'); return false; }
  for(var item of currentCart) { const prod = appData.products.find(p => p.id === item.id); if(prod.stock < item.qty) { Swal.fire('Stock insuficiente', `No hay suficiente stock de ${prod.name}`, 'error'); return false; } }
  const subt = currentCart.reduce((s,i) => s + i.price * i.qty, 0), tax = subt * (systemConfig.itbisRate / 100), total = subt + tax;
  const paymentMethod = document.getElementById('paymentMethod')?.value || 'Efectivo', cashReceived = safeParseFloat(document.getElementById('cashReceived')?.value);
  if(paymentMethod === 'Efectivo' && cashReceived < total) { Swal.fire('Error', 'Monto insuficiente', 'error'); return false; }
  const change = (paymentMethod === 'Efectivo') ? cashReceived - total : 0;
  let client = null; if(isInvoice) { const customerSelect = document.getElementById('customerSelect'); if(customerSelect && customerSelect.value) client = appData.customers.find(c => c.id === parseInt(customerSelect.value)); }
  const saleRecord = { id: Date.now(), date: getCurrentDateTime(), clientName: isInvoice ? (client ? client.name : 'Consumidor Final') : 'VENTA SIN FACTURA', rnc: isInvoice ? (client ? client.rnc : '') : '', subtotal: subt, tax: tax, total: total, paymentMethod: paymentMethod, change: change, items: currentCart.map(i => ({ name: i.name, qty: i.qty, price: i.price })), cashier: currentUser.name };
  if(isInvoice) { saleRecord.invoiceNumber = appData.nextInvoiceId++; saleRecord.status = "Pagada"; appData.invoices.unshift(saleRecord); }
  else { saleRecord.ticketNumber = appData.nextTicketId++; appData.salesWithoutInvoice.unshift(saleRecord); }
  for(var item of currentCart) { const prod = appData.products.find(p => p.id === item.id); if(prod) prod.stock -= item.qty; }
  appData.cashSessions.currentCash += total; saveData();

  return `<div class="animate-fade-up"><div class="glass-card rounded-2xl p-6 shadow-xl"><h2 class="text-2xl font-bold gradient-text mb-6">Reportes Financieros</h2><div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8"><div class="stat-card text-center"><i class="fas fa-file-invoice text-3xl mb-2" style="color:#4299e1;"></i><p class="text-xs">Total Facturas</p><p class="text-2xl font-bold" id="statsTotalFacturas">0</p></div><div class="stat-card text-center"><i class="fas fa-chart-line text-3xl mb-2" style="color:#48bb78;"></i><p class="text-xs">Total Ventas</p><p class="text-2xl font-bold" id="statsTotalVentas">RD$ 0</p></div><div class="stat-card text-center"><i class="fas fa-percent text-3xl mb-2" style="color:#9f7aea;"></i><p class="text-xs">Total ITBIS</p><p class="text-2xl font-bold" id="statsTotalITBIS">RD$ 0</p></div><div class="stat-card text-center"><i class="fas fa-chart-simple text-3xl mb-2" style="color:#ed8936;"></i><p class="text-xs">Ticket Promedio</p><p class="text-2xl font-bold" id="statsTicketPromedio">RD$ 0</p></div></div><div class="grid md:grid-cols-2 gap-4 mb-4"><div><label class="form-label">Fecha Desde</label><input type="date" id="reportFrom" class="input-premium" onchange="filterReports()"></div><div><label class="form-label">Fecha Hasta</label><input type="date" id="reportTo" class="input-premium" onchange="filterReports()"></div></div><div class="mb-4"><div class="relative"><i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i><input type="text" id="reportSearchInput" placeholder="Buscar..." class="input-premium pl-10" onkeyup="filterReports()"></div></div><div class="flex gap-3 mb-6"><button onclick="exportToExcel()" class="px-5 py-2 rounded-xl font-semibold" style="background:#48bb78;color:white;border:none;"><i class="fas fa-file-excel mr-2"></i>Excel</button><button onclick="exportToPDF()" class="px-5 py-2 rounded-xl font-semibold" style="background:#f56565;color:white;border:none;"><i class="fas fa-file-pdf mr-2"></i>PDF</button><button onclick="clearFilters()" class="px-5 py-2 rounded-xl font-semibold" style="background:#718096;color:white;border:none;"><i class="fas fa-eraser mr-2"></i>Limpiar</button></div><div class="overflow-x-auto border rounded-xl"><table class="data-table"><thead><tr><th>#Factura</th><th>Fecha</th><th>Cliente</th><th>Subtotal</th><th>ITBIS</th><th>Total</th><th>Acciones</th></tr></thead><tbody id="reportTableBody"><tr><td colspan="7" class="text-center p-8" style="color:var(--gray-600);">Cargando...</td></tr></tbody></table></div><div class="mt-4 text-right text-sm" id="reportCountInfo"></div></div></div>`;
}
let currentReportData = [], currentReportFiltered = [];
function filterReports() { const from = document.getElementById('reportFrom')?.value||'', to = document.getElementById('reportTo')?.value||'', search = document.getElementById('reportSearchInput')?.value.toLowerCase()||''; currentReportData = appData.invoices.filter(inv => { const d = formatDateForCompare(inv.date); if(from && d<from) return false; if(to && d>to) return false; return true; }); currentReportFiltered = currentReportData.filter(inv => { if(!search) return true; return String(inv.invoiceNumber).toLowerCase().includes(search) || inv.clientName.toLowerCase().includes(search) || inv.rnc.toLowerCase().includes(search); }); updateReportTable(); }
function updateReportTable() { const tbody = document.getElementById('reportTableBody'); if(!tbody) return; if(currentReportFiltered.length===0) { tbody.innerHTML='<tr><td colspan="7" class="text-center p-8">No hay facturas</td></tr>'; updateStats(0,0,0); return; } let total=0, tax=0, html=''; for(var inv of currentReportFiltered) { total+=inv.total; tax+=inv.tax; html += `<tr><td><span class="font-mono font-semibold gradient-text">${inv.invoiceNumber}</span></td><td>${inv.date}</td><td>${escapeHtml(inv.clientName)}</td><td>${formatCurrency(inv.subtotal)}</td><td>${formatCurrency(inv.tax)}</td><td><span class="font-bold gradient-text">${formatCurrency(inv.total)}</span></td><td><button onclick="viewInvoice(${inv.id})" style="color:var(--primary);background:none;border:none;"><i class="fas fa-eye"></i></button></td></tr>`; } html += `<tr style="background:var(--gray-100);font-weight:bold;"><td colspan="3" class="text-right">TOTALES:</td><td>${formatCurrency(currentReportFiltered.reduce((s,i)=>s+i.subtotal,0))}</td><td>${formatCurrency(tax)}</td><td style="color:var(--primary);">${formatCurrency(total)}</td><td></td></tr>`; tbody.innerHTML=html; updateStats(currentReportFiltered.length,total,tax); const info=document.getElementById('reportCountInfo'); if(info) info.innerHTML=`Mostrando ${currentReportFiltered.length} de ${currentReportData.length} facturas | Total: ${formatCurrency(total)}`; }
function updateStats(t,v,i) { const e=(id,val)=>{const el=document.getElementById(id); if(el) el.innerHTML=val;}; e('statsTotalFacturas',t); e('statsTotalVentas',formatCurrency(v)); e('statsTotalITBIS',formatCurrency(i)); e('statsTicketPromedio',formatCurrency(t>0?v/t:0)); }
function clearFilters() { const from=document.getElementById('reportFrom'), to=document.getElementById('reportTo'), search=document.getElementById('reportSearchInput'); if(from) { const d=new Date(); d.setDate(1); from.value=d.toISOString().split('T')[0]; } if(to) to.value=getCurrentISODate(); if(search) search.value=''; filterReports(); }
function exportToExcel() { if(currentReportFiltered.length===0) { Swal.fire('Sin datos', 'No hay datos para exportar', 'warning'); return; } const data = currentReportFiltered.map(i=>({Factura:i.invoiceNumber,Fecha:i.date,Cliente:i.clientName,RNC:i.rnc,Subtotal:i.subtotal,ITBIS:i.tax,Total:i.total,Pago:i.paymentMethod})); const ws = XLSX.utils.json_to_sheet(data), wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Reporte'); XLSX.writeFile(wb, `reporte_${Date.now()}.xlsx`); Swal.fire('Exportado', 'Archivo Excel generado', 'success'); }
function exportToPDF() { if(currentReportFiltered.length===0) { Swal.fire('Sin datos', 'No hay datos para exportar', 'warning'); return; } if(typeof window.jspdf==='undefined'||!window.jspdf.jsPDF) { Swal.fire('Error', 'PDF no disponible', 'error'); return; } const doc = new window.jspdf.jsPDF({ orientation:'landscape' }); doc.setFontSize(16); doc.setTextColor(102,126,234); doc.text('FrioFantasy - Reporte de Facturas',14,15); doc.setFontSize(10); doc.setTextColor(100,100,100); doc.text(`Generado: ${new Date().toLocaleString()}`,14,25); const body = currentReportFiltered.map(i=>[String(i.invoiceNumber),i.date,i.clientName,formatCurrency(i.subtotal),formatCurrency(i.tax),formatCurrency(i.total)]); body.push(['','','','','','']); body.push(['','','TOTAL GENERAL:','','',formatCurrency(currentReportFiltered.reduce((s,i)=>s+i.total,0))]); if(doc.autoTable) doc.autoTable({ head:[['Factura','Fecha','Cliente','Subtotal','ITBIS','Total']], body, startY:35, theme:'striped', headStyles:{fillColor:[102,126,234]} }); doc.save(`reporte_${Date.now()}.pdf`); Swal.fire('Exportado', 'PDF generado', 'success'); }

function agregarDineroCaja() {
  Swal.fire({
    title: '<i class="fas fa-plus-circle" style="color:#48bb78;"></i> Agregar Dinero',
    html: `
      <div class="space-y-4">
        <div>
          <label class="text-xs font-semibold uppercase tracking-wide mb-2 block text-left" style="color:#718096;">Monto a agregar</label>
          <div class="relative">
            <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);font-weight:700;color:#48bb78;">RD$</span>
            <input type="number" id="cashAddAmount" min="1" step="0.01" class="input-premium" style="padding-left:52px;" placeholder="0.00">
          </div>
        </div>
        <div>
          <label class="text-xs font-semibold uppercase tracking-wide mb-2 block text-left" style="color:#718096;">Concepto</label>
          <input type="text" id="cashAddConcept" class="input-premium" placeholder="Ej: Apertura de caja, Depósito...">
        </div>
      </div>`,
    showCancelButton: true,
    confirmButtonText: '<i class="fas fa-check mr-1"></i> Agregar',
    cancelButtonText: 'Cancelar',
    confirmButtonColor: '#48bb78',
    preConfirm: () => {
      const monto = parseFloat(document.getElementById('cashAddAmount')?.value);
      const concepto = document.getElementById('cashAddConcept')?.value?.trim();
      if (!monto || monto <= 0) { Swal.showValidationMessage('Ingresa un monto válido'); return false; }
      if (!concepto) { Swal.showValidationMessage('Ingresa un concepto'); return false; }
      appData.cashSessions.currentCash += monto;
      appData.cashSessions.movimientos = appData.cashSessions.movimientos || [];
      appData.cashSessions.movimientos.unshift({ tipo: 'ingreso', monto, concepto, fecha: getCurrentDateTime(), usuario: currentUser?.name || 'Sistema' });
      saveData();
      loadModule('cash');
      Swal.fire({ title: '¡Dinero agregado!', html: `<p class="text-2xl font-bold" style="color:#48bb78;">+${formatCurrency(monto)}</p><p class="text-sm text-gray-500">Nueva caja: ${formatCurrency(appData.cashSessions.currentCash)}</p>`, icon: 'success', timer: 2000, showConfirmButton: false });
    }
  });
}

function retirarDineroCaja() {
  Swal.fire({
    title: '<i class="fas fa-minus-circle" style="color:#f56565;"></i> Retirar Dinero',
    html: `
      <div class="space-y-4">
        <div>
          <label class="text-xs font-semibold uppercase tracking-wide mb-2 block text-left" style="color:#718096;">Monto a retirar</label>
          <div class="relative">
            <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);font-weight:700;color:#f56565;">RD$</span>
            <input type="number" id="cashRetireAmount" min="1" step="0.01" class="input-premium" style="padding-left:52px;" placeholder="0.00">
          </div>
        </div>
        <div>
          <label class="text-xs font-semibold uppercase tracking-wide mb-2 block text-left" style="color:#718096;">Concepto</label>
          <input type="text" id="cashRetireConcept" class="input-premium" placeholder="Ej: Gasto operativo, Pago de proveedor...">
        </div>
      </div>`,
    showCancelButton: true,
    confirmButtonText: '<i class="fas fa-check mr-1"></i> Retirar',
    cancelButtonText: 'Cancelar',
    confirmButtonColor: '#f56565',
    preConfirm: () => {
      const monto = parseFloat(document.getElementById('cashRetireAmount')?.value);
      const concepto = document.getElementById('cashRetireConcept')?.value?.trim();
      if (!monto || monto <= 0) { Swal.showValidationMessage('Ingresa un monto válido'); return false; }
      if (!concepto) { Swal.showValidationMessage('Ingresa un concepto'); return false; }
      if (monto > appData.cashSessions.currentCash) { Swal.showValidationMessage(`No hay suficiente efectivo. Disponible: ${formatCurrency(appData.cashSessions.currentCash)}`); return false; }
      appData.cashSessions.currentCash -= monto;
      appData.cashSessions.movimientos = appData.cashSessions.movimientos || [];
      appData.cashSessions.movimientos.unshift({ tipo: 'retiro', monto, concepto, fecha: getCurrentDateTime(), usuario: currentUser?.name || 'Sistema' });
      saveData();
      loadModule('cash');
      Swal.fire({ title: 'Retiro registrado', html: `<p class="text-2xl font-bold" style="color:#f56565;">-${formatCurrency(monto)}</p><p class="text-sm text-gray-500">Nueva caja: ${formatCurrency(appData.cashSessions.currentCash)}</p>`, icon: 'success', timer: 2000, showConfirmButton: false });
    }
  });
}

let _ultimoPedidoWebVisto = null;

function checkNuevosPedidosWeb() {
  if (!currentUser) return;
  const stored = localStorage.getItem('friofantasy_webhook_data');
  if (!stored) return;
  try {
    const parsed = JSON.parse(stored);

    // Detectar pedidos nuevos
    const pedidos = parsed.pedidos || [];
    const pedidosNoNotificados = pedidos.filter(p => {
      const key = 'friofantasy_notif_' + (p.orderNumber || p.id);
      return !localStorage.getItem(key);
    });
    for (const pedido of pedidosNoNotificados) {
      const key = 'friofantasy_notif_' + (pedido.orderNumber || pedido.id);
      localStorage.setItem(key, '1');
      agregarNotificacionWeb({ tipo: 'pedido', datos: pedido });
      const moduleContent = document.getElementById('moduleContent');
      if (moduleContent && (moduleContent.innerHTML.includes('Pedidos') || moduleContent.innerHTML.includes('Gestiona pedidos'))) {
        loadModule('orders');
      }
    }

    // Detectar clientes nuevos
    const clientes = parsed.clientes || [];
    const clientesNoNotificados = clientes.filter(c => {
      const key = 'friofantasy_notif_cli_' + (c.email || c.id);
      return !localStorage.getItem(key);
    });
    for (const cliente of clientesNoNotificados) {
      const key = 'friofantasy_notif_cli_' + (cliente.email || cliente.id);
      localStorage.setItem(key, '1');
      agregarNotificacionWeb({ tipo: 'cliente', datos: cliente });
      const moduleContent = document.getElementById('moduleContent');
      if (moduleContent && moduleContent.innerHTML.includes('Clientes')) {
        loadModule('customers');
      }
    }

  } catch(e) {}
}

const FIREBASE_CONFIG = { databaseURL: "https://basedatos-92fd6-default-rtdb.firebaseio.com/" };

let firebaseDB = null;
let firebaseListenerActive = false;
let pedidosYaVistosFirebase = new Set();

// ── Cola offline ────────────────────────────────────────────────────────────
function vaciarColaOffline() {
  const cola = JSON.parse(localStorage.getItem('ff_cola_offline') || '[]');
  if (!firebaseDB || cola.length === 0) return;
  console.log('🔥 Vaciando cola offline:', cola.length, 'pendiente(s)');

  if (d.products !== undefined) firebaseSyncTodas(d);
  localStorage.setItem('ff_cola_offline', '[]');
  actualizarIndicadorRed();
  Swal.fire({ title: '¡Sincronizado!', text: 'Los cambios offline fueron guardados en Firebase', icon: 'success', timer: 3000, showConfirmButton: false, toast: true, position: 'top-end' });
}

// ── Indicador visual de red ──────────────────────────────────────────────────
function actualizarIndicadorRed() {
  const dot   = document.getElementById('networkDot');
  const icon  = document.getElementById('networkIcon');
  const label = document.getElementById('networkLabel');
  const badge = document.getElementById('pendingBadge');
  const ind   = document.getElementById('networkIndicator');
  if (!dot) return;
  const online = navigator.onLine;
  const cola   = JSON.parse(localStorage.getItem('ff_cola_offline') || '[]');
  if (online) {
    dot.style.background = '#48bb78'; icon.style.color = '#48bb78';
    icon.className = 'fas fa-wifi'; label.style.color = '#48bb78';
    label.textContent = 'En línea'; if (ind) ind.style.background = 'var(--gray-100)';
  } else {
    dot.style.background = '#f56565'; icon.style.color = '#f56565';
    icon.className = 'fas fa-times-circle'; label.style.color = '#f56565';
    label.textContent = 'Sin internet'; if (ind) ind.style.background = '#fff5f5';
  }
  if (cola.length > 0) {
    badge.classList.remove('hidden');
    badge.textContent = cola.length + ' pendiente' + (cola.length > 1 ? 's' : '');
  } else { badge.classList.add('hidden'); }
}
window.addEventListener('online',  () => { actualizarIndicadorRed(); setTimeout(vaciarColaOffline, 1000); });
window.addEventListener('offline', () => { actualizarIndicadorRed(); });

// ── Cargar datos desde Firebase al inicio ───────────────────────────────────
function firebaseLoadData() {
  if (!firebaseDB) return;
  firebaseDB.ref('sistema').once('value', snap => {
    const d = snap.val(); if (!d) { console.log('Firebase vacío — usando datos locales'); return; }
    try {
      let changed = false;
      if (d.productos) { const arr = Object.values(d.productos); if (arr.length >= appData.products.length) { appData.products = arr; changed = true; } }
      if (d.clientes)  { const arr = Object.values(d.clientes);  if (arr.length >= appData.customers.length) { appData.customers = arr; changed = true; } }
      if (d.usuarios)  { const arr = Object.values(d.usuarios);  if (arr.length > 0) { appData.users = arr; changed = true; } }
      if (d.facturas)  { const arr = Object.values(d.facturas);  if (arr.length >= appData.invoices.length) { appData.invoices = arr; const maxId = Math.max(...arr.map(f=>f.invoiceNumber||0)); if (maxId >= appData.nextInvoiceId) appData.nextInvoiceId = maxId + 1; changed = true; } }
      if (d.ordenes)   { const arr = Object.values(d.ordenes);   if (arr.length >= appData.orders.length)   { appData.orders = arr; changed = true; } }
      if (d.caja)      { appData.cashSessions = d.caja; changed = true; }
      if (d.config)    { systemConfig = { ...systemConfig, ...d.config }; changed = true; }
      if (d.contadores){ appData.nextInvoiceId = Math.max(appData.nextInvoiceId, d.contadores.nextInvoiceId||0); appData.nextTicketId = Math.max(appData.nextTicketId, d.contadores.nextTicketId||0); appData.nextOrderId = Math.max(appData.nextOrderId, d.contadores.nextOrderId||0); }
      if (changed) {
        localStorage.setItem('friofantasy_data_v10', JSON.stringify({ products: appData.products, customers: appData.customers, invoices: appData.invoices, salesWithoutInvoice: appData.salesWithoutInvoice, orders: appData.orders, users: appData.users, cashSessions: appData.cashSessions, nextInvoiceId: appData.nextInvoiceId, nextTicketId: appData.nextTicketId, nextOrderId: appData.nextOrderId, systemConfig: systemConfig }));
        console.log('🔥 Datos cargados desde Firebase');
      }
    } catch(e) { console.warn('Error cargando desde Firebase:', e); }
  });
}

function initFirebase() {
  try {
    if (!firebase.apps.length) { firebase.initializeApp(FIREBASE_CONFIG); }
    firebaseDB = firebase.database();
    // Indicador preciso usando Firebase .info/connected
    firebaseDB.ref('.info/connected').on('value', snap => {
      const connected = snap.val();
      const dot = document.getElementById('networkDot'), icon = document.getElementById('networkIcon');
      const label = document.getElementById('networkLabel'), ind = document.getElementById('networkIndicator');
      if (!dot) return;
      if (connected) {
        dot.style.background='#48bb78'; icon.style.color='#48bb78'; icon.className='fas fa-wifi';
        label.style.color='#48bb78'; label.textContent='En línea'; if(ind) ind.style.background='var(--gray-100)';
        document.getElementById('pendingBadge')?.classList.add('hidden');
        // Vaciar cola si hay pendientes
        const cola = JSON.parse(localStorage.getItem('ff_cola_offline')||'[]');
        if (cola.length > 0) setTimeout(vaciarColaOffline, 800);
      } else {
        dot.style.background='#f56565'; icon.style.color='#f56565'; icon.className='fas fa-times-circle';
        label.style.color='#f56565'; label.textContent='Sin internet'; if(ind) ind.style.background='#fff5f5';
        actualizarIndicadorRed();
      }
    });
    console.log("🔥 Firebase iniciado");
    return true;
  } catch(e) { console.error("❌ Error Firebase:", e); return false; }
}

function escucharPedidosFirebase() {
  if (!firebaseDB || firebaseListenerActive) return;
  firebaseListenerActive = true;

  const refPedidos = firebaseDB.ref('pedidos');

  // Primero cargamos los existentes sin notificar (solo marcarlos como vistos)
  refPedidos.once('value', snapshot => {
    const datos = snapshot.val();
    if (datos) {
      Object.keys(datos).forEach(key => {
        pedidosYaVistosFirebase.add(key);
        // Sincronizar con webData local
        const pedido = datos[key];
        const yaExiste = webData.pedidos.some(p => p.firebaseKey === key || p.orderNumber === pedido.orderNumber);
        if (!yaExiste) {
          webData.pedidos.unshift({ ...pedido, firebaseKey: key });
        }
      });
      localStorage.setItem('friofantasy_webhook_data', JSON.stringify(webData));
      console.log(`🔥 Firebase: ${Object.keys(datos).length} pedidos existentes cargados`);
    }
  });

  // Luego escuchamos nuevos en tiempo real
  refPedidos.on('child_added', snapshot => {
    const key = snapshot.key;
    const pedido = snapshot.val();

    // Si ya lo teníamos al cargar, ignoramos
    if (pedidosYaVistosFirebase.has(key)) return;
    pedidosYaVistosFirebase.add(key);

    console.log("🔥 Nuevo pedido desde Firebase:", pedido);

    // Agregar a webData local
    const yaExiste = webData.pedidos.some(p => p.orderNumber === pedido.orderNumber || p.firebaseKey === key);
    if (!yaExiste) {
      webData.pedidos.unshift({ ...pedido, firebaseKey: key });
      localStorage.setItem('friofantasy_webhook_data', JSON.stringify(webData));
    }

    // Notificación solo si hay usuario logueado
    if (!currentUser) return;
    agregarNotificacionWeb({ tipo: 'pedido', datos: pedido });

    // Refrescar módulo de pedidos si está abierto
    const mc = document.getElementById('moduleContent');
    if (mc && mc.innerHTML.includes('Gestiona pedidos')) {
      loadModule('orders');
    }
  });

  // Escuchar cambios de estado (completado, etc.)
  refPedidos.on('child_changed', snapshot => {
    const key = snapshot.key;
    const pedido = snapshot.val();
    const idx = webData.pedidos.findIndex(p => p.firebaseKey === key || p.orderNumber === pedido.orderNumber);
    if (idx !== -1) {
      webData.pedidos[idx] = { ...pedido, firebaseKey: key };
      localStorage.setItem('friofantasy_webhook_data', JSON.stringify(webData));
    }
    const mc = document.getElementById('moduleContent');
    if (mc && (mc.innerHTML.includes('Gestiona pedidos') || mc.innerHTML.includes('Datos de la Web'))) {
      loadModule('orders');
    }
  });
}

function marcarPedidoCompletadoFirebase(orderNumber, firebaseKey) {
  if (!firebaseDB) return;
  // Buscar la key si no la tenemos
  if (!firebaseKey) {
    firebaseDB.ref('pedidos').orderByChild('orderNumber').equalTo(orderNumber).once('value', snap => {
      snap.forEach(child => {
        child.ref.update({ estado: 'completado' });
      });
    });
  } else {
    firebaseDB.ref('pedidos/' + firebaseKey).update({ estado: 'completado' });
  }
}

// Inicializar Firebase al cargar la página
actualizarIndicadorRed(); // Estado inicial antes de que Firebase confirme
if (initFirebase()) {
  escucharPedidosFirebase();

  firebaseLoadData();

  setTimeout(() => {

      if (d.products !== undefined) { firebaseSyncTodas(d); console.log('🔥 Datos locales subidos a Firebase'); }
    }
  }, 2000);
}
